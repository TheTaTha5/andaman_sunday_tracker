/* ============================================================
   Work History view
============================================================ */
function WorkHistory({ tasks, onEdit, onDelete, currentProject }) {
  if (tasks.length === 0) {
    return (
      <div className="rounded-2xl border-2 border-dashed py-16 text-center" style={{ borderColor: T.border, backgroundColor: T.cardBg }}>
        <History size={32} className="mx-auto mb-3" style={{ color: T.textMuted }} />
        <h3 className="text-lg font-bold mb-1" style={{ color: T.text }}>ยังไม่มีประวัติการทำงาน</h3>
        <p className="text-sm" style={{ color: T.textMuted }}>เพิ่ม task แล้วเริ่มทำงาน ระบบจะบันทึกประวัติให้</p>
      </div>
    );
  }

  // Group by relative time bucket
  const groups = {};
  const now = new Date(); now.setHours(0,0,0,0);
  tasks.forEach(t => {
    const d = new Date(t.updatedAt); d.setHours(0,0,0,0);
    const diffDays = Math.round((now - d) / 86400000);
    let bucket;
    if (diffDays === 0) bucket = 'วันนี้';
    else if (diffDays === 1) bucket = 'เมื่อวาน';
    else if (diffDays <= 7) bucket = 'สัปดาห์นี้';
    else if (diffDays <= 30) bucket = 'เดือนนี้';
    else bucket = 'เก่ากว่านั้น';
    if (!groups[bucket]) groups[bucket] = [];
    groups[bucket].push(t);
  });

  const order = ['วันนี้', 'เมื่อวาน', 'สัปดาห์นี้', 'เดือนนี้', 'เก่ากว่านั้น'];

  return (
    <div className="space-y-6">
      <div className="flex items-end justify-between flex-wrap gap-3">
        <div>
          <h2 className="text-2xl md:text-3xl font-bold tracking-tight" style={{ color: T.text }}>Work History</h2>
          <p className="text-sm mt-1" style={{ color: T.textMuted }}>
            ประวัติการทำงานทั้งหมด — โปรเจกต์ "{currentProject?.name || '-'}" · {tasks.length} รายการ
          </p>
        </div>
        <ExportButton
          label="Export History"
          onClick={() => exportToCSV(tasks, [
            { label: 'ชื่อ Task', value: 'title' },
            { label: 'หมวดหมู่', value: 'category' },
            { label: 'สถานะ', value: (r) => STATUS_META[getStatus(r)]?.label || '-' },
            { label: 'ผู้รับผิดชอบ', value: (r) => formatPersonsText(r) },
            { label: 'Deadline', value: 'deadline' },
            { label: 'Progress', value: (r) => r.progress ?? 0 },
            { label: 'อัพเดทล่าสุด', value: 'updatedAt' },
            { label: 'หมายเหตุ', value: 'notes' },
          ], 'work_history')}
        />
      </div>

      {order.filter(b => groups[b]).map(bucket => (
        <div key={bucket}>
          <div className="flex items-center gap-3 mb-3">
            <div className="text-xs font-bold uppercase tracking-wider" style={{ color: T.textMuted }}>{bucket}</div>
            <div className="flex-1 h-px" style={{ backgroundColor: T.border }} />
            <div className="text-xs" style={{ color: T.textMuted }}>{groups[bucket].length} task</div>
          </div>
          <div className="space-y-2">
            {groups[bucket].map(t => (
              <HistoryRow
                key={t.id}
                task={t}
                onEdit={() => onEdit(t)}
                onDelete={() => onDelete(t.id)}
              />
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

function HistoryRow({ task, onEdit, onDelete }) {
  const status = getStatus(task);
  const meta = STATUS_META[status];
  const StatusIcon = meta.icon;
  const catColor = getCategoryColor(task.category);
  const updated = new Date(task.updatedAt);
  const timeStr = new Intl.DateTimeFormat('th-TH', { hour: '2-digit', minute: '2-digit' }).format(updated);
  const dateStr = new Intl.DateTimeFormat('th-TH', { day: 'numeric', month: 'short' }).format(updated);

  return (
    <div
      onClick={onEdit}
      className="flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer hover:shadow transition group"
      style={{ backgroundColor: T.cardBg, border: `1px solid ${T.border}` }}
    >
      <span className="w-2 h-10 rounded-full flex-shrink-0" style={{ backgroundColor: catColor }} />

      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-2 mb-0.5">
          <span className="text-xs font-semibold px-2 py-0.5 rounded" style={{ color: catColor, backgroundColor: catColor + '15' }}>
            {task.category}
          </span>
          <span className="inline-flex items-center gap-1 text-xs font-medium px-2 py-0.5 rounded-full" style={{ color: meta.color, backgroundColor: meta.bg }}>
            <StatusIcon size={10} />
            {meta.label}
          </span>
        </div>
        <div className="text-sm font-semibold truncate" style={{ color: T.text }}>{task.title}</div>
      </div>

      <div className="hidden sm:flex items-center gap-3 flex-shrink-0">
        <div className="text-xs text-right">
          <div className="font-semibold" style={{ color: T.text }}>{task.progress ?? 0}%</div>
          <div style={{ color: T.textMuted }}>progress</div>
        </div>
        {getPersons(task).length > 0 ? (
          <AvatarStack names={getPersons(task)} size={28} max={3} />
        ) : (
          <div className="w-7 h-7 rounded-full border-2 border-dashed" style={{ borderColor: T.border }} />
        )}
        <div className="text-xs text-right min-w-[70px]" style={{ color: T.textMuted }}>
          <div className="font-medium" style={{ color: T.text }}>{dateStr}</div>
          <div>{timeStr} น.</div>
        </div>
      </div>

      <button
        onClick={(e) => { e.stopPropagation(); onDelete(); }}
        className="p-1.5 rounded-md hover:bg-rose-50 opacity-0 group-hover:opacity-100 transition flex-shrink-0"
        title="ลบ task นี้"
      >
        <Trash2 size={14} style={{ color: '#BE123C' }} />
      </button>
    </div>
  );
}

function TeamModal({ members, onSave, onClose }) {
  const [list, setList] = useState(members);
  const [draftName, setDraftName] = useState('');
  const [draftColor, setDraftColor] = useState(TEAM_COLOR_PALETTE[0]);

  const updateMember = (idx, patch) => {
    setList(list.map((m, i) => i === idx ? { ...m, ...patch } : m));
  };
  const removeMember = (idx) => {
    setList(list.filter((_, i) => i !== idx));
  };
  const addMember = () => {
    const name = draftName.trim();
    if (!name) { alert('กรอกชื่อก่อนนะ'); return; }
    if (list.some(m => m.name.toLowerCase() === name.toLowerCase())) {
      alert('ชื่อซ้ำแล้ว'); return;
    }
    setList([...list, { name, color: draftColor }]);
    setDraftName('');
    setDraftColor(TEAM_COLOR_PALETTE[(list.length + 1) % TEAM_COLOR_PALETTE.length]);
  };
  const handleSave = () => {
    if (list.length === 0) { alert('ต้องมีสมาชิกอย่างน้อย 1 คน'); return; }
    if (list.some(m => !m.name.trim())) { alert('ทุกคนต้องมีชื่อ'); return; }
    onSave(list);
  };

  return (
    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4" style={{ backgroundColor: 'rgba(11, 18, 32, 0.6)' }} onClick={onClose}>
      <div className="w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]" style={{ backgroundColor: T.cardBg }} onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between px-6 py-4 border-b" style={{ borderColor: T.border }}>
          <div>
            <h2 className="text-lg font-bold" style={{ color: T.text }}>จัดการทีม</h2>
            <p className="text-xs mt-0.5" style={{ color: T.textMuted }}>เพิ่ม / แก้ไข / ลบ สมาชิกทีม</p>
          </div>
          <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-black/5">
            <X size={18} style={{ color: T.textMuted }} />
          </button>
        </div>

        <div className="p-6 space-y-3 overflow-y-auto">
          {list.map((m, idx) => (
            <div key={idx} className="flex items-center gap-2 p-2.5 rounded-lg border" style={{ borderColor: T.border, backgroundColor: 'white' }}>
              {/* Color swatch with picker */}
              <details className="relative">
                <summary className="w-8 h-8 rounded-full cursor-pointer list-none flex items-center justify-center shadow-sm" style={{ backgroundColor: m.color }}>
                  <span className="text-white text-xs font-bold">{m.name.charAt(0).toUpperCase()}</span>
                </summary>
                <div className="absolute top-10 left-0 z-10 p-2 rounded-xl shadow-lg grid grid-cols-4 gap-1.5" style={{ backgroundColor: 'white', border: `1px solid ${T.border}`, width: 160 }}>
                  {TEAM_COLOR_PALETTE.map(c => (
                    <button key={c}
                      onClick={(e) => { e.preventDefault(); updateMember(idx, { color: c }); e.currentTarget.closest('details').open = false; }}
                      className="w-7 h-7 rounded-full hover:scale-110 transition"
                      style={{ backgroundColor: c, boxShadow: c === m.color ? `0 0 0 2px ${T.text}` : 'none' }}
                    />
                  ))}
                </div>
              </details>

              <input
                value={m.name}
                onChange={(e) => updateMember(idx, { name: e.target.value })}
                className="flex-1 px-3 py-2 text-sm rounded-lg border outline-none focus:ring-2"
                style={{ borderColor: T.border }}
                placeholder="ชื่อสมาชิก"
              />

              >
                <Trash2 size={16} style={{ color: '#BE123C' }} />

          ))}

              style={{ borderColor: T.border }}
            />
            <button

              style={{ backgroundColor: T.navy }}

      <div className="rounded-xl px-4 py-2.5 flex items-center justify-between text-xs"

        <div className="flex items-center gap-3 flex-wrap">
          <span style={{ color: T.navy }} className="font-semibold">
            📊 ทั้งหมดในโปรเจกต์: <strong>{totalCount}</strong> รายการ
          </span>
          {posts.length !== totalCount && (
            <span style={{ color: T.text }}>
              · กำลังแสดง <strong>{posts.length}</strong> รายการ (มี filter)
            </span>
          )}
        </div>
        {totalCount === 0 && (
          <span style={{ color: '#BE123C' }} className="font-semibold">
            ⚠️ ไม่พบข้อมูล — กด Reload เพื่อโหลดจาก Cloud
          </span>
        )}
      </div>

      {/* Filter bar */}
      <div className="rounded-2xl p-4 flex flex-wrap items-center gap-2" style={{ backgroundColor: T.cardBg, border: `1px solid ${T.border}` }}>
        <div className="flex items-center gap-1.5 flex-wrap">
          <FilterChip active={filterChannel === 'all'} label="ทุก Channel" onClick={() => setFilterChannel('all')} />
          {CHANNELS.map(c => (
            <FilterChip
              key={c.name}
              active={filterChannel === c.name}
              label={c.name}
              color={c.color}
              bg={c.bg}
              onClick={() => setFilterChannel(filterChannel === c.name ? 'all' : c.name)}
            />
          ))}
        </div>
        <div className="w-px h-6 mx-2" style={{ backgroundColor: T.border }} />
        <div className="flex items-center gap-1.5 flex-wrap">
          <FilterChip active={filterStatus === 'all'} label="ทุกสถานะ" onClick={() => setFilterStatus('all')} />
          {POST_STATUSES.map(s => (
            <FilterChip
              key={s.name}
              active={filterStatus === s.name}
              label={s.name}
              color={s.color}
              bg={s.bg}
              onClick={() => setFilterStatus(filterStatus === s.name ? 'all' : s.name)}
            />
          ))}
        </div>
        <span className="ml-auto text-xs" style={{ color: T.textMuted }}>{posts.length} รายการ</span>
      </div>

      {/* Table */}
      {posts.length === 0 ? (
        <div className="rounded-2xl border-2 border-dashed py-16 text-center" style={{ borderColor: T.border, backgroundColor: T.cardBg }}>
          <CalendarRange size={32} className="mx-auto mb-3" style={{ color: T.textMuted }} />
          <h3 className="text-lg font-bold mb-1" style={{ color: T.text }}>{totalCount === 0 ? 'ยังไม่มี Post' : 'ไม่พบ Post ที่ตรงกับ filter'}</h3>
          <p className="text-sm mb-5" style={{ color: T.textMuted }}>
            {totalCount === 0
              ? 'เริ่มวางแผน social media ครั้งแรก'
              : `มีโพสต์ทั้งหมด ${totalCount} รายการในโปรเจกต์ — แค่ filter กำลังกรองอยู่`}
          </p>
          {totalCount === 0 ? (
            <button onClick={onAdd} className="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold rounded-lg text-white" style={{ backgroundColor: T.navy }}>
              <Plus size={16} /> เพิ่ม Post แรก
            </button>
          ) : (
            <button
              onClick={() => { setFilterChannel('all'); setFilterStatus('all'); }}
              className="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold rounded-lg text-white"
              style={{ backgroundColor: T.navy }}
            >
              <RefreshCw size={14} /> ล้าง filter ทั้งหมด → ดูครบ {totalCount} รายการ
            </button>
          )}
        </div>
      ) : (
        <div className="rounded-2xl overflow-hidden" style={{ backgroundColor: T.cardBg, border: `1px solid ${T.border}` }}>
          <div className="overflow-x-auto">
            <table className="w-full text-sm" style={{ minWidth: '900px' }}>
              <thead style={{ backgroundColor: '#F8FAFC' }}>
                <tr className="text-left">
                  <Th>Channel</Th>
                  <Th>Day</Th>
                  <Th>Status</Th>
                  <Th>Date</Th>
                  <Th>Time</Th>
                  <Th>Topic / Type</Th>
                  <Th>Copy</Th>
                  <Th>Format</Th>
                  <Th className="text-center">Link</Th>
                  <Th></Th>
                </tr>
              </thead>
              <tbody>
                {posts.map(p => <PostRow key={p.id} post={p} onEdit={() => onEdit(p)} onDelete={() => onDelete(p.id)} />)}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

function Th({ children, className = '' }) {
  return (
    <th className={`px-3 py-2.5 text-[11px] font-bold uppercase tracking-wider ${className}`} style={{ color: T.textMuted }}>
      {children}
    </th>
  );
}

function FilterChip({ active, label, color, bg, onClick }) {
  const fallbackColor = active ? '#fff' : T.textMuted;
  const fallbackBg = active ? T.navy : 'white';
  return (
    <button
      onClick={onClick}
      className="px-3 py-1 text-xs font-semibold rounded-full border transition whitespace-nowrap"
      style={{
        backgroundColor: active ? (color || T.navy) : fallbackBg,
        color: active ? 'white' : (color || T.textMuted),
        borderColor: active ? (color || T.navy) : T.border,
      }}
    >
      {label}
    </button>
  );
}

function PostRow({ post, onEdit, onDelete }) {
  const ch = getChannelMeta(post.channel);
  const st = getPostStatusMeta(post.status);
  const fm = getFormatMeta(post.format);
  const StatusIcon = st.icon;
  const day = post.day || dayFromDate(post.date) || '-';
  const dateFormatted = post.date
    ? new Intl.DateTimeFormat('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' }).format(new Date(post.date)).replace(/\//g, '.')
    : '-';

  return (
    <tr
      onClick={onEdit}
      className="border-t cursor-pointer hover:bg-slate-50 transition group"
      style={{ borderColor: T.border }}
    >
      <td className="px-3 py-2.5">
        <Pill color={ch.color} bg={ch.bg}>{post.channel}</Pill>
      </td>
      <td className="px-3 py-2.5 text-xs font-medium" style={{ color: T.text }}>{day}</td>
      <td className="px-3 py-2.5">
        <span className="inline-flex items-center gap-1 text-xs font-semibold px-2 py-0.5 rounded-full" style={{ color: st.color, backgroundColor: st.bg }}>
          <StatusIcon size={10} />
          {post.status}
        </span>
      </td>
      <td className="px-3 py-2.5 text-xs whitespace-nowrap" style={{ color: T.text }}>{dateFormatted}</td>
      <td className="px-3 py-2.5 text-xs whitespace-nowrap" style={{ color: T.text }}>{post.time || '-'}</td>
      <td className="px-3 py-2.5">
        {getPersons(post).length > 0 ? (
          <div className="flex items-center gap-1.5">
            <AvatarStack names={getPersons(post)} size={22} max={3} />
            <span className="text-xs font-semibold" style={{ color: T.text }}>
              {getPersons(post).length === 1 ? getPersons(post)[0] : `${getPersons(post)[0]} +${getPersons(post).length - 1}`}
            </span>
          </div>
        ) : (
          <div className="flex items-center gap-1.5">
            <div className="w-[22px] h-[22px] rounded-full border-2 border-dashed" style={{ borderColor: T.border }} />
            <span className="text-xs" style={{ color: T.textMuted }}>ยังไม่ assign</span>
          </div>
        )}
      </td>
      <td className="px-3 py-2.5 text-xs" style={{ color: T.text }}>{post.topicType || '-'}</td>
      <td className="px-3 py-2.5 text-xs font-medium max-w-[200px] truncate" style={{ color: T.text }} title={post.copy}>
        {post.copy || '-'}
      </td>
      <td className="px-3 py-2.5">
        {post.format ? <Pill color={fm.color} bg={fm.bg}>{post.format}</Pill> : <span className="text-xs" style={{ color: T.textMuted }}>-</span>}
      </td>
      <td className="px-3 py-2.5 text-center">
        {post.link ? (
          <a href={post.link} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="inline-flex p-1.5 rounded hover:bg-slate-200" title={post.link}>
            <ExternalLink size={13} style={{ color: T.navy }} />
          </a>
        ) : <span className="text-xs" style={{ color: T.textMuted }}>-</span>}
      </td>
      <td className="px-3 py-2.5">
        <div className="flex items-center gap-0.5 opacity-0 group-hover:opacity-100">
          <button onClick={(e) => { e.stopPropagation(); onEdit(); }} className="p-1.5 rounded hover:bg-slate-200" title="แก้ไข">
            <Edit3 size={13} style={{ color: T.textMuted }} />
          </button>
          <button onClick={(e) => { e.stopPropagation(); onDelete(); }} className="p-1.5 rounded hover:bg-rose-50" title="ลบ">
            <Trash2 size={13} style={{ color: '#BE123C' }} />
          </button>
        </div>
      </td>
    </tr>
  );
}

function Pill({ color, bg, children }) {
  return (
    <span className="inline-block text-xs font-semibold px-2.5 py-1 rounded-md whitespace-nowrap" style={{ color, backgroundColor: bg }}>
      {children}
    </span>
  );
}

/* ============================================================
   Post Modal (add / edit)
============================================================ */
function PostModal({ post, onSave, onClose, teamMembers }) {
  const [channel, setChannel] = useState(post?.channel || CHANNELS[0].name);
  const [date, setDate] = useState(post?.date || '');
  const [day, setDay] = useState(post?.day || (post?.date ? dayFromDate(post.date) : DAYS[0]));
  const [time, setTime] = useState(post?.time || '');
  const [status, setStatus] = useState(post?.status || POST_STATUSES[2].name);
  const [persons, setPersonsState] = useState(getPersons(post));
  const [topicType, setTopicType] = useState(post?.topicType || POST_TOPICS[0]);
  const [copy, setCopy] = useState(post?.copy || '');
  const [format, setFormat] = useState(post?.format || POST_FORMATS[0].name);
  const [link, setLink] = useState(post?.link || '');

  const togglePerson = (name) => {
    setPersonsState(prev => prev.includes(name) ? prev.filter(p => p !== name) : [...prev, name]);
  };

  // Auto-update day when date changes
  const handleDateChange = (newDate) => {
    setDate(newDate);
    if (newDate) setDay(dayFromDate(newDate));
  };

  const handleSave = () => {
    if (!copy.trim() && !topicType) { alert('กรอก Copy หรือ Topic ก่อนนะ'); return; }
    onSave({
      ...(post || {}),
      channel, day, status, date, time,
      topicType, copy: copy.trim(), format,
      link: link.trim(),
      ...buildPersonFields(persons),
    });
  };

  return (
    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4" style={{ backgroundColor: 'rgba(11, 18, 32, 0.6)' }} onClick={onClose}>
      <div className="w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden" style={{ backgroundColor: T.cardBg }} onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between px-6 py-4 border-b" style={{ borderColor: T.border }}>
          <h2 className="text-lg font-bold" style={{ color: T.text }}>{post ? 'แก้ไข Planning Post' : 'เพิ่ม Planning Post'}</h2>
          <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-black/5">
            <X size={18} style={{ color: T.textMuted }} />
          </button>
        </div>

        <div className="p-6 space-y-4 max-h-[75vh] overflow-y-auto">
          {/* Channel — colored chips */}
          <Field label="Channel" required>
            <div className="flex gap-1.5 flex-wrap">
              {CHANNELS.map(c => {
                const active = channel === c.name;
                return (
                  <button key={c.name} onClick={() => setChannel(c.name)}
                    className="px-3 py-1.5 text-xs font-semibold rounded-lg border transition"
                    style={{
                      backgroundColor: active ? c.color : c.bg,
                      borderColor: active ? c.color : c.bg,
                      color: active ? 'white' : c.color,
                    }}>{c.name}</button>
                );
              })}
            </div>
          </Field>

          {/* Status — colored chips */}
          <Field label="Status">
            <div className="flex gap-1.5 flex-wrap">
              {POST_STATUSES.map(s => {
                const active = status === s.name;
                const Ic = s.icon;
                return (
                  <button key={s.name} onClick={() => setStatus(s.name)}
                    className="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold rounded-lg border transition"
                    style={{
                      backgroundColor: active ? s.color : s.bg,
                      borderColor: active ? s.color : s.bg,
                      color: active ? 'white' : s.color,
                    }}>
                    <Ic size={12} />
                    {s.name}
                  </button>
                );
              })}
            </div>
          </Field>

          {/* Date / Time / Day */}
          <div className="grid grid-cols-3 gap-3">
            <Field label="Date">
              <input type="date" value={date} onChange={(e) => handleDateChange(e.target.value)}
                className="w-full px-3 py-2 text-sm rounded-lg border bg-white outline-none"
                style={{ borderColor: T.border }} />
            </Field>
            <Field label="Time">
              <input type="time" value={time} onChange={(e) => setTime(e.target.value)}
                className="w-full px-3 py-2 text-sm rounded-lg border bg-white outline-none"
                style={{ borderColor: T.border }} />
            </Field>
            <Field label="Day">
              <select value={day} onChange={(e) => setDay(e.target.value)}
                className="w-full px-3 py-2 text-sm rounded-lg border bg-white outline-none cursor-pointer"
                style={{ borderColor: T.border }}>
                {DAYS.map(d => <option key={d} value={d}>{d}</option>)}
              </select>
            </Field>
          </div>

          {/* Person responsible — multi-select */}
          <Field label={`ผู้รับผิดชอบ ${persons.length > 0 ? `(${persons.length} คน)` : '— กดเลือกได้หลายคน'}`}>
            <div className="flex gap-1.5 flex-wrap">
              {(teamMembers || DEFAULT_TEAM_MEMBERS).map(m => {
                const active = persons.includes(m.name);
                return (
                  <button key={m.name}
                    onClick={() => togglePerson(m.name)}
                    className="flex items-center gap-2 px-3 py-1.5 rounded-lg border transition"
                    style={{
                      backgroundColor: active ? m.color : 'white',
                      borderColor: active ? m.color : T.border,
                    }}>
                    <Avatar name={m.name} color={active ? 'rgba(255,255,255,0.25)' : m.color} size={20} />
                    <span className="text-xs font-semibold" style={{ color: active ? 'white' : T.text }}>{m.name}</span>
                    {active && <CheckCircle2 size={12} style={{ color: 'white' }} />}
                  </button>
                );
              })}
            </div>
          </Field>

          {/* Topic / Type */}
          <Field label="Post Topic / Type">
            <select value={topicType} onChange={(e) => setTopicType(e.target.value)}
              className="w-full px-3.5 py-2.5 text-sm rounded-lg border bg-white outline-none cursor-pointer"
              style={{ borderColor: T.border }}>
              {POST_TOPICS.map(t => <option key={t} value={t}>{t}</option>)}
            </select>
          </Field>

          {/* Copy */}
          <Field label="Copy" required>
            <input value={copy} onChange={(e) => setCopy(e.target.value)}
              placeholder="เช่น หมู่เกาะสุรินทร์, อ่าวมาหยา, baboon run…"
              className="w-full px-3.5 py-2.5 text-sm rounded-lg border bg-white outline-none focus:ring-2"
              style={{ borderColor: T.border }} />
          </Field>

          {/* Format — colored chips */}
          <Field label="Format">
            <div className="flex gap-1.5 flex-wrap">
              {POST_FORMATS.map(f => {
                const active = format === f.name;
                return (
                  <button key={f.name} onClick={() => setFormat(f.name)}
                    className="px-3 py-1.5 text-xs font-semibold rounded-lg border transition"
                    style={{
                      backgroundColor: active ? f.color : f.bg,
                      borderColor: active ? f.color : f.bg,
                      color: active ? 'white' : f.color,
                    }}>{f.name}</button>
                );
              })}
            </div>
          </Field>

          {/* Link */}
          <Field label="Link to Published Post">
            <input value={link} onChange={(e) => setLink(e.target.value)}
              placeholder="https://www.facebook.com/share/..."
              className="w-full px-3.5 py-2.5 text-sm rounded-lg border bg-white outline-none"
              style={{ borderColor: T.border }} />
          </Field>
        </div>

        <div className="flex items-center justify-end gap-2 px-6 py-4 border-t" style={{ backgroundColor: '#FAFAF7', borderColor: T.border }}>
          <button onClick={onClose} className="px-4 py-2 text-sm font-medium rounded-lg hover:bg-black/5" style={{ color: T.textMuted }}>ยกเลิก</button>
          <button onClick={handleSave} className="px-5 py-2 text-sm font-semibold rounded-lg text-white shadow-sm" style={{ backgroundColor: T.navy }}>
            {post ? 'บันทึก' : 'เพิ่ม Post'}
          </button>
        </div>
      </div>
    </div>
  );
}


    /* Render + live update listener */
    const rootEl = ReactDOM.createRoot(document.getElementById('root'));
    rootEl.render(<App />);
  </script>
</bod
