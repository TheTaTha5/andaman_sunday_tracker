       ----------
       วิธีเปลี่ยน password:
       1. เปิด browser console (F12) ในหน้านี้
       2. paste: await sha256('รหัสใหม่ของพี่') แล้ว Enter
       3. copy hash ที่ได้ ใส่แทน PASSWORD_HASH ด้านล่าง
       4. save + deploy ใหม่
       ========================================================================= */
    const PASSWORD_HASH = 'e958197ac42643caedd9e39d80b28131cdf9032c3a399f095318c3ecf1ef3afa';
    const LOCK_VERSION = 'v3';  // bump นี้จะบังคับให้ทุกคนกรอก password อีกรอบ

    async function sha256(text) {
      const enc = new TextEncoder().encode(text);
      const buf = await crypto.subtle.digest('SHA-256', enc);
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }
    window.sha256 = sha256;

    const UNLOCK_KEY = 'as_unlocked_' + LOCK_VERSION;

    function showLockScreen() {
      const root = document.getElementById('root');
      root.innerHTML = `
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#241A0E 0%,#E89537 100%);">

              <div style="font-size:13px;color:#64748B;margin-top:4px;">Team Task Tracker</div>
            </div>
            <form id="unlock-form">
              <label style="display:block;font-size:12px;font-weight:600;color:#241A0E;margin-bottom:6px;">รหัสผ่านทีม</label>
              <input id="pw-input" type="password" autocomplete="current-password" autofocus
                style="width:100%;padding:12px 14px;border:1px solid #E5E0D3;border-radius:10px;font-size:14px;outline:none;box-sizing:border-box;"
                placeholder="••••••••" />
              <div id="pw-error" style="color:#BE123C;font-size:12px;margin-top:8px;min-height:16px;"></div>
              <button type="submit"
                style="width:100%;margin-top:14px;padding:12px;background:#E89537;color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;">
                เข้าสู่ระบบ
              </button>
            </form>
            <div style="text-align:center;font-size:11px;color:#94A3B8;margin-top:20px;line-height:1.6;">
              รหัสผ่านสำหรับทีม Marketing เท่านั้น<br/>
              ถามได้ที่ admin ของทีม
            </div>
          </div>
        </div>
      `;
      document.getElementById('unlock-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const input = document.getElementById('pw-input');
        const err = document.getElementById('pw-error');
        err.textContent = '';
        const hash = await sha256(input.value);
        if (hash === PASSWORD_HASH) {
          try { localStorage.setItem(UNLOCK_KEY, '1'); } catch (e) {}
          location.reload();
        } else {
          err.textContent = '❌ รหัสผ่านไม่ถูกต้อง';
          input.value = '';
          input.focus();
        }
      });
    }

    // Check if already unlocked
    let unlocked = false;
    try { unlocked = localStorage.getItem(UNLOCK_KEY) === '1'; } catch (e) {}

    if (!unlocked) {
      showLockScreen();
      window.__LOCKED__ = true;  // flag so Firebase/App scripts skip
    }

          '<div style="font-size:12px;color:#94A3B8;margin-top:8px;">ดูขั้นตอนใน README.txt</div>' +
        '</div>';
      throw new Error('Firebase config not set');
    }

    firebase.initializeApp(FIREBASE_CONFIG);
    const db = firebase.firestore();
    const docRef = db.collection(DOC_PATH.col).doc(DOC_PATH.doc);

    // Firebase-backed storage adapter (shape matches Claude's window.storage)
    window.storage = {
      async get(key, shared) {
        // Force server fetch (no cache) to always get latest data
        const snap = await docRef.get({ source: 'server' });
        if (!snap.exists) return null;
        const data = snap.data();
        return data[key] !== undefined ? { value: data[key] } : null;
      },
      async set(key, value, shared) {
        await docRef.set({ [key]: value, _updatedAt: Date.now() }, { merge: true });
      },
    };

    // Real-time updates: dispatch event when remote changes arrive
    let _lastLocalSet = 0;
    const origSet = window.storage.set;
    window.storage.set = async function (key, value, shared) {
      _lastLocalSet = Date.now();
      return origSet.call(window.storage, key, value, shared);
    };
    docRef.onSnapshot((snap) => {
      if (!snap.exists) return;
      const ts = (snap.data() && snap.data()._updatedAt) || 0;
      // Only notify if update came from elsewhere (> 1.5s after our local set)
      if (ts > _lastLocalSet + 1500) {
        window.dispatchEvent(new Event('remote-update'));
      }
    }, (err) => console.warn('Firestore snapshot error:', err));
  </script>

const getPersonColor   = (n) => CURRENT_TEAM.find(p => p.name === n)?.color || '#94A3B8';
const getInitials = (n) => {
  if (!n) return '?';
  const cleaned = n.replace(/[^A-Za-zก-๙]/g, '');
  return cleaned.slice(0, 2).toUpperCase();
};
const getStatus = (t) => {
  if ((t.progress ?? 0) >= 100) return 'done';
  const today = new Date(); today.setHours(0,0,0,0);
  if (t.deadline && new Date(t.deadline) < today) return 'overdue';
  if ((t.progress ?? 0) > 0) return 'inProgress';
  return 'notStarted';
};
const daysFromToday = (d) => {
  if (!d) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const dd = new Date(d); dd.setHours(0,0,0,0);
  return Math.round((dd - today) / 86400000);
};
const relativeDeadline = (d) => {
  const days = daysFromToday(d);
  if (days === null) return null;
  if (days === 0) return 'วันนี้';
  if (days === 1) return 'พรุ่งนี้';
  if (days === -1) return 'เมื่อวาน';
  if (days > 0) return `อีก ${days} วัน`;
  return `เลย ${Math.abs(days)} วัน`;
};
const newId = () => 'tsk_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
const formatDateLong = (d) => new Intl.DateTimeFormat('th-TH', { day: 'numeric', month: 'long', year: 'numeric' }).format(d);

/* ===== Multi-person helpers (backward compatible) =====
   Old data: { person: 'Aun' }
   New data: { person: 'Aun', persons: ['Aun', 'Tata'] }   <- both fields kept
   getPersons() reads either format and always returns array. */
const getPersons = (item) => {
  if (!item) return [];
  if (Array.isArray(item.persons) && item.persons.length > 0) {
    return item.persons.filter(Boolean);
  }
  if (typeof item.person === 'string' && item.person.trim()) {
    return [item.person.trim()];
  }
  return [];
};
const formatPersonsText = (item) => getPersons(item).join(', ');
const itemMatchesPerson = (item, name) => {
  if (name === 'all') return true;
  return getPersons(item).includes(name);
};
/* When saving, write both `persons` array AND `person` string (= persons[0] || '')
   so older deployed HTML still reads old field correctly. */
const buildPersonFields = (personsArr) => {
  const arr = (personsArr || []).filter(Boolean);
  return { persons: arr, person: arr[0] || '' };
};

/* ===== Local Backup Helpers (Option A) =====
   Snapshots all Firebase data to browser localStorage on every load + manual save.
   This is each user's personal backup — different per browser, per device. */
const BACKUP_KEY = 'la_backup_history_v1';
const BACKUP_MAX = 15;  // keep last 15 snapshots

function saveLocalBackup(stateData, tag) {
  try {
    const existing = (() => {
      try { return JSON.parse(localStorage.getItem(BACKUP_KEY) || '[]'); }
      catch { return []; }
    })();
    const snapshot = {
      id: 'bak_' + Date.now().toString(36),
      timestamp: Date.now(),
      date: new Date().toISOString(),
      tag: tag || 'auto',
      counts: {
        tasks: (stateData['content-tracker-v1'] || []).length,
        posts: (stateData['planning-posts-v1'] || []).length,
        jobs: (stateData['pr-jobs-v1'] || []).length,
        team: (stateData['team-members-v1'] || []).length,
      },
      data: stateData,
    };
    // Don't save if last snapshot has same counts AND was within 60s (avoid spam)
    const last = existing[0];
    if (last && tag === 'auto' &&
        Date.now() - last.timestamp < 60000 &&
        last.counts.tasks === snapshot.counts.tasks &&
        last.counts.posts === snapshot.counts.posts &&
        last.counts.jobs === snapshot.counts.jobs) {
      return null;
    }
    const newHistory = [snapshot, ...existing].slice(0, BACKUP_MAX);
    localStorage.setItem(BACKUP_KEY, JSON.stringify(newHistory));
    return snapshot;
  } catch (e) {
    console.warn('Local backup failed:', e.message);
    return null;
  }
}

function getLocalBackups() {
  try { return JSON.parse(localStorage.getItem(BACKUP_KEY) || '[]'); }
  catch { return []; }
}

function deleteLocalBackup(id) {
  try {
    const list = getLocalBackups().filter(b => b.id !== id);
    localStorage.setItem(BACKUP_KEY, JSON.stringify(list));
  } catch (e) {}
}

function downloadBackupAsJson(snapshot) {
  const blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateStr = new Date(snapshot.timestamp).toISOString().slice(0, 19).replace(/:/g, '-');
  a.href = url;
  a.download = `andaman_sunday_backup_${dateStr}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ===== CSV Export Helper ===== */
const escapeCsv = (val) => {
  if (val === null || val === undefined) return '';
  const s = String(val);
  if (s.includes(',') || s.includes('"') || s.includes('\n') || s.includes('\r')) {
    return `"${s.replace(/"/g, '""')}"`;
  }
  return s;
};

const exportToCSV = (rows, columns, filename) => {
  if (!rows || rows.length === 0) {
    alert('ไม่มีข้อมูลให้ export');
    return;
  }
  const header = columns.map(c => escapeCsv(c.label)).join(',');
  const lines = rows.map(r =>
    columns.map(c => escapeCsv(typeof c.value === 'function' ? c.value(r) : r[c.value])).join(',')
  );
  // Add BOM so Excel opens UTF-8 correctly
  const csv = '\uFEFF' + [header, ...lines].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `${filename}_${date}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

/* Reusable Export button component */
function ExportButton({ onClick, label = 'Export CSV' }) {
  return (
    <button
      onClick={onClick}
      className="inline-flex items-center gap-1.5 px-3 py-2 text-xs font-semibold rounded-lg border bg-white hover:shadow transition"
      style={{ borderColor: T.border, color: T.text }}
      title={`ดาวน์โหลด ${label} เป็นไฟล์ CSV (เปิดใน Excel ได้)`}
    >
      <Download size={14} style={{ color: T.navy }} />
      <span>{label}</span>
    </button>
  );
}

/* ============================================================
   Root App
============================================================ */
function App() {
  const [tasks, setTasks] = useState([]);
  const [posts, setPosts] = useState([]);
  const [teamMembers, setTeamMembers] = useState(DEFAULT_TEAM_MEMBERS);
  const [showTeamModal, setShowTeamModal] = useState(false);
  /* Keep CURRENT_TEAM in sync so top-level helpers (getPersonColor) stay correct */
  useEffect(() => { CURRENT_TEAM = teamMembers; }, [teamMembers]);
  const [projects, setProjects] = useState([DEFAULT_PROJECT]);
  const [currentProjectId, setCurrentProjectId] = useState(DEFAULT_PROJECT.id);
  const [loading, setLoading] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const [error, setError] = useState(null);
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [showProjectModal, setShowProjectModal] = useState(false);
  const [showPostModal, setShowPostModal] = useState(false);
  const [editingPost, setEditingPost] = useState(null);
  const [postFilterChannel, setPostFilterChannel] = useState('all');
  const [postFilterStatus, setPostFilterStatus] = useState('all');
  /* PR Jobs state */
  const [jobs, setJobs] = useState([]);
  const [showJobModal, setShowJobModal] = useState(false);
  const [editingJob, setEditingJob] = useState(null);
  const [jobFilterCategory, setJobFilterCategory] = useState('all');
  const [jobFilterStatus, setJobFilterStatus] = useState('all');
  /* Backup modal */
  const [showBackupModal, setShowBackupModal] = useState(false);
  const [view, setView] = useState('dashboard');
  const [filterStatus, setFilterStatus] = useState('all');
  const [filterCategory, setFilterCategory] = useState('all');
  const [filterPerson, setFilterPerson] = useState('all');
  const [search, setSearch] = useState('');
  const [sidebarOpen, setSidebarOpen] = useState(false);

  const load = async () => {
    setLoading(true);
    let existing = [];
    try {
      const r = await window.storage.get(STORAGE_KEY, true);
      if (r?.value) existing = JSON.parse(r.value);
    } catch (e) {}

    // Load projects
    let loadedProjects = [DEFAULT_PROJECT];
    try {
      const r = await window.storage.get(PROJECTS_KEY, true);
      if (r?.value) {
        const parsed = JSON.parse(r.value);
        if (Array.isArray(parsed) && parsed.length > 0) loadedProjects = parsed;
      }
    } catch (e) {}
    setProjects(loadedProjects);

    // Load current project ID
    let loadedCurrent = DEFAULT_PROJECT.id;
    try {
      const r = await window.storage.get(CURRENT_PROJECT_KEY, true);
      if (r?.value) loadedCurrent = r.value;
    } catch (e) {}

    // Load planning posts + seed if first time
    let existingPosts = [];
    try {
      const r = await window.storage.get(POSTS_KEY, true);
      if (r?.value) existingPosts = JSON.parse(r.value);
    } catch (e) {}

    let mergedPosts = [...existingPosts];
    let postsTouched = false;
    for (const batch of POST_SEED_BATCHES) {
      // Triple protection: skip seeding if (a) flag exists, OR (b) any post already
      // has an id that starts with "pst_seed_" (= already seeded before).
      // This prevents duplicate seeding even if the flag write failed previously.
      let seeded = false;
      try {
        const f = await window.storage.get(batch.flag, true);
        if (f?.value) seeded = true;
      } catch (e) {}
      const hasAnySeedPost = existingPosts.some(p => typeof p.id === 'string' && p.id.startsWith('pst_seed_'));
      if (!seeded && !hasAnySeedPost) {
        const now = new Date().toISOString();
        const seededPosts = batch.posts.map((p, i) => ({
          ...p,
          id: `pst_seed_${Date.now().toString(36)}_${i}`,
          projectId: DEFAULT_PROJECT.id,
          createdAt: now,
          updatedAt: now,
        }));
        mergedPosts = [...mergedPosts, ...seededPosts];
        postsTouched = true;
        try { await window.storage.set(batch.flag, '1', true); } catch (e) {}
      } else if (!seeded && hasAnySeedPost) {
        // Posts were seeded before but flag is missing — set flag to prevent future re-seeds
        try { await window.storage.set(batch.flag, '1', true); } catch (e) {}
      }
    }
    // Load team members
    try {
      const tmRaw = await window.storage.get(TEAM_KEY, true);
      if (tmRaw?.value) {
        const parsed = JSON.parse(tmRaw.value);
        if (Array.isArray(parsed) && parsed.length > 0) {
          setTeamMembers(parsed);
          CURRENT_TEAM = parsed;
        }
      }
    } catch (e) {}

    // Run post migrations (backfill missing fields for existing users)
    for (const mig of POST_MIGRATIONS) {
      let ran = false;
      try { const f = await window.storage.get(mig.flag, true); if (f?.value) ran = true; } catch (e) {}
      if (!ran) {
        mergedPosts = mig.run(mergedPosts);
        postsTouched = true;
        try { await window.storage.set(mig.flag, '1', true); } catch (e) {}
      }
    }
    if (postsTouched) {
      try { await window.storage.set(POSTS_KEY, JSON.stringify(mergedPosts), true); } catch (e) {}
    }
    setPosts(mergedPosts);
    // Validate current still exists; fallback to first
    if (!loadedProjects.find(p => p.id === loadedCurrent)) {
      loadedCurrent = loadedProjects[0].id;
    }
    setCurrentProjectId(loadedCurrent);

    let merged = [...existing], touched = false;

    for (const batch of SEED_BATCHES) {
      let seeded = false;
      try { const f = await window.storage.get(batch.flag, true); if (f?.value) seeded = true; } catch (e) {}
      if (!seeded) {
        const now = new Date().toISOString();
        merged = [...merged, ...batch.tasks.map(t => ({ ...t, id: newId(), createdAt: now, updatedAt: now }))];
        touched = true;
        try { await window.storage.set(batch.flag, '1', true); } catch (e) {}
      }
    }
    for (const mig of MIGRATIONS) {
      let ran = false;
      try { const f = await window.storage.get(mig.flag, true); if (f?.value) ran = true; } catch (e) {}
      if (!ran) {
        merged = mig.run(merged);
        touched = true;
        try { await window.storage.set(mig.flag, '1', true); } catch (e) {}
      }
    }
    if (touched) {
      try { await window.storage.set(STORAGE_KEY, JSON.stringify(merged), true); } catch (e) {}
    }
    setTasks(merged);

    // Load PR Jobs
    let loadedJobs = [];
    try {
      const r = await window.storage.get(JOBS_KEY, true);
      if (r?.value) {
        loadedJobs = JSON.parse(r.value);
        setJobs(loadedJobs);
      }
    } catch (e) {}

    // Auto-backup snapshot to localStorage (Option A)
    try {
      saveLocalBackup({
        [STORAGE_KEY]: merged,
        [POSTS_KEY]: mergedPosts,
        [JOBS_KEY]: loadedJobs,
        [TEAM_KEY]: (await window.storage.get(TEAM_KEY, true).catch(() => null))?.value
          ? JSON.parse((await window.storage.get(TEAM_KEY, true)).value)
          : [],
        [PROJECTS_KEY]: loadedProjects,
        [CURRENT_PROJECT_KEY]: loadedCurrent,
      }, 'auto');
    } catch (e) {}

    setError(null);
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  // Auto-refresh when another user updates data (via Firebase realtime)
  useEffect(() => {
    const handler = () => load();
    window.addEventListener('remote-update', handler);
    return () => window.removeEventListener('remote-update', handler);
  }, []);

  const persist = async (next) => {
    setSyncing(true);
    try { await window.storage.set(STORAGE_KEY, JSON.stringify(next), true); setError(null); }
    catch (e) { setError('บันทึกไม่สำเร็จ'); }
    finally { setSyncing(false); }
  };

  const persistProjects = async (next) => {
    try { await window.storage.set(PROJECTS_KEY, JSON.stringify(next), true); }
    catch (e) { setError('บันทึก projects ไม่สำเร็จ'); }
  };
  const switchProject = async (id) => {
    setCurrentProjectId(id);
    try { await window.storage.set(CURRENT_PROJECT_KEY, id, true); } catch (e) {}
  };
  const addProject = async (name) => {
    const trimmed = name.trim();
    if (!trimmed) return;
    const colors = ['#E89537', '#0E7490', '#7C3AED', '#BE185D', '#B45309', '#047857', '#F2B24C'];
    const color = colors[projects.length % colors.length];
    const newProj = { id: newProjectId(), name: trimmed, color };
    const next = [...projects, newProj];
    setProjects(next);
    await persistProjects(next);
    await switchProject(newProj.id);
  };
  const deleteProject = async (id) => {
    if (id === DEFAULT_PROJECT.id) { alert('ลบโปรเจกต์เริ่มต้นไม่ได้'); return; }
    const proj = projects.find(p => p.id === id);
    const taskCount = tasks.filter(t => t.projectId === id).length;
    const postCount = posts.filter(p => p.projectId === id).length;
    if (!confirm(`ลบโปรเจกต์ "${proj?.name}"?\n\nจะลบ task ${taskCount} อัน + post ${postCount} อันด้วย — ทำไม่ได้`)) return;
    const nextProjects = projects.filter(p => p.id !== id);
    const nextTasks = tasks.filter(t => t.projectId !== id);
    const nextPosts = posts.filter(p => p.projectId !== id);
    setProjects(nextProjects);
    setTasks(nextTasks);
    setPosts(nextPosts);
    await persistProjects(nextProjects);
    await persist(nextTasks);
    await persistPosts(nextPosts);
    if (currentProjectId === id) await switchProject(nextProjects[0].id);
  };

  /* ----- Planning Post CRUD ----- */
  const persistPosts = async (next) => {
    setSyncing(true);
    try { await window.storage.set(POSTS_KEY, JSON.stringify(next), true); setError(null); }
    catch (e) { setError('บันทึก post ไม่สำเร็จ'); }
    finally { setSyncing(false); }
  };
  const savePost = async (post) => {
    let next;
    if (post.id && posts.find(p => p.id === post.id)) {
      next = posts.map(p => p.id === post.id ? { ...post, updatedAt: new Date().toISOString() } : p);
    } else {
      next = [...posts, {
        ...post,
        id: 'pst_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        projectId: post.projectId || currentProjectId,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
      }];
    }
    setPosts(next);
    setShowPostModal(false);
    setEditingPost(null);
    await persistPosts(next);
  };
  const deletePost = async (id) => {
    if (!confirm('ลบ post นี้?')) return;
    const next = posts.filter(p => p.id !== id);
    setPosts(next);
    await persistPosts(next);
  };

  /* ----- PR Jobs CRUD ----- */
  const persistJobs = async (next) => {
    setSyncing(true);
    try { await window.storage.set(JOBS_KEY, JSON.stringify(next), true); setError(null); }
    catch (e) { setError('บันทึก job ไม่สำเร็จ'); }
    finally { setSyncing(false); }
  };
  const saveJob = async (job) => {
    let next;
    if (job.id && jobs.find(j => j.id === job.id)) {
      next = jobs.map(j => j.id === job.id ? { ...job, updatedAt: new Date().toISOString() } : j);
    } else {
      next = [...jobs, {
        ...job,
        id: 'job_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        projectId: job.projectId || currentProjectId,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
      }];
    }
    setJobs(next);
    setShowJobModal(false);
    setEditingJob(null);
    await persistJobs(next);
  };
  const deleteJob = async (id) => {
    if (!confirm('ลบ job นี้?')) return;
    const next = jobs.filter(j => j.id !== id);
    setJobs(next);
    await persistJobs(next);
  };
  const updateJobProgress = async (id, p) => {
    const next = jobs.map(j => j.id === id ? { ...j, progress: p, updatedAt: new Date().toISOString() } : j);
    setJobs(next);
    await persistJobs(next);
  };

  /* Restore from local backup (Option A) */
  const restoreFromBackup = async (snapshot, scope) => {
    // scope = 'all' | 'posts' | 'tasks' | 'jobs' | 'team'
    const data = snapshot.data || {};
    setSyncing(true);
    try {
      // Save a "before-restore" backup so we can undo
      saveLocalBackup({
        [STORAGE_KEY]: tasks,
        [POSTS_KEY]: posts,
        [JOBS_KEY]: jobs,
        [TEAM_KEY]: teamMembers,
        [PROJECTS_KEY]: projects,
        [CURRENT_PROJECT_KEY]: currentProjectId,
      }, 'before-restore');

      const restorePosts  = scope === 'all' || scope === 'posts';
      const restoreTasks  = scope === 'all' || scope === 'tasks';
      const restoreJobs   = scope === 'all' || scope === 'jobs';
      const restoreTeam   = scope === 'all' || scope === 'team';

      if (restoreTasks && data[STORAGE_KEY]) {
        await window.storage.set(STORAGE_KEY, JSON.stringify(data[STORAGE_KEY]), true);
        setTasks(data[STORAGE_KEY]);
      }
      if (restorePosts && data[POSTS_KEY]) {
        await window.storage.set(POSTS_KEY, JSON.stringify(data[POSTS_KEY]), true);
        setPosts(data[POSTS_KEY]);
      }
      if (restoreJobs && data[JOBS_KEY]) {
        await window.storage.set(JOBS_KEY, JSON.stringify(data[JOBS_KEY]), true);
        setJobs(data[JOBS_KEY]);
      }
      if (restoreTeam && data[TEAM_KEY]) {
        await window.storage.set(TEAM_KEY, JSON.stringify(data[TEAM_KEY]), true);
        setTeamMembers(data[TEAM_KEY]);
        CURRENT_TEAM = data[TEAM_KEY];
      }
      setError(null);
      setShowBackupModal(false);
      alert('✅ กู้คืนข้อมูลสำเร็จ — โหลดหน้าใหม่อาจเห็นชัดขึ้น');
    } catch (e) {
      setError('กู้คืนไม่สำเร็จ: ' + e.message);
    } finally {
      setSyncing(false);
    }
  };

  /* Save a manual backup snapshot of current state */
  const saveManualBackup = () => {
    const snap = saveLocalBackup({
      [STORAGE_KEY]: tasks,
      [POSTS_KEY]: posts,
      [JOBS_KEY]: jobs,
      [TEAM_KEY]: teamMembers,
      [PROJECTS_KEY]: projects,
      [CURRENT_PROJECT_KEY]: currentProjectId,
    }, 'manual');
    if (snap) alert('✅ บันทึกสำเร็จ — เก็บไว้ใน browser ของคุณ');
    else alert('⚠️ บันทึกไม่สำเร็จ (browser อาจปิด localStorage)');
  };

  const saveTask = async (task) => {
    let next;
    if (task.id && tasks.find(t => t.id === task.id)) {
      next = tasks.map(t => t.id === task.id ? { ...task, updatedAt: new Date().toISOString() } : t);
    } else {
      next = [...tasks, {
        ...task,
        id: newId(),
        projectId: task.projectId || currentProjectId,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
      }];
    }
    setTasks(next); setShowModal(false); setEditing(null);
    await persist(next);
  };
  const deleteTask = async (id) => {
    if (!confirm('ลบ task นี้?')) return;
    const next = tasks.filter(t => t.id !== id);
    setTasks(next); await persist(next);
  };
  const updateProgress = async (id, p) => {
    const next = tasks.map(t => t.id === id ? { ...t, progress: p, updatedAt: new Date().toISOString() } : t);
    setTasks(next); await persist(next);
  };

  /* ----- Team Members ----- */
  const saveTeamMembers = async (members) => {
    setTeamMembers(members);
    CURRENT_TEAM = members;
    try { await window.storage.set(TEAM_KEY, JSON.stringify(members), true); } catch (e) {}
  };

  /* ----- Derived ----- */
  // Tasks scoped to current project
  const projectTasks = useMemo(() => tasks.filter(t => t.projectId === currentProjectId), [tasks, currentProjectId]);

  const stats = useMemo(() => {
    let done = 0, inProgress = 0, notStarted = 0, overdue = 0;
    projectTasks.forEach(t => {
      const s = getStatus(t);
      if (s === 'done') done++;
      else if (s === 'overdue') overdue++;
      else if (s === 'inProgress') inProgress++;
      else notStarted++;
    });
    const avg = projectTasks.length === 0 ? 0 : Math.round(projectTasks.reduce((s, t) => s + (t.progress ?? 0), 0) / projectTasks.length);
    return { total: projectTasks.length, done, inProgress, notStarted, overdue, avg };
  }, [projectTasks]);

  const upcoming = useMemo(() =>
    projectTasks
      .filter(t => t.deadline && getStatus(t) !== 'done')
      .sort((a, b) => new Date(a.deadline) - new Date(b.deadline))
      .slice(0, 6)
  , [projectTasks]);

  /* Urgent: overdue + due in next 2 days, not done */
  const dueSoon = useMemo(() =>
    projectTasks
      .filter(t => {
        if (!t.deadline || getStatus(t) === 'done') return false;
        const d = daysFromToday(t.deadline);
        return d <= 2; // overdue (<0), today (0), tomorrow (1), day after (2)
      })
      .sort((a, b) => new Date(a.deadline) - new Date(b.deadline))
  , [projectTasks]);

  const inProgressTasks = useMemo(() =>
    projectTasks.filter(t => getStatus(t) === 'inProgress').slice(0, 4)
  , [projectTasks]);

  // Work History: all tasks in current project, sorted by updatedAt desc
  const historyTasks = useMemo(() =>
    [...projectTasks].sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt))
  , [projectTasks]);

  // Planning posts scoped to current project
  const projectPosts = useMemo(() => posts.filter(p => p.projectId === currentProjectId), [posts, currentProjectId]);

  /* Planning post stats for dashboard */
  const postStats = useMemo(() => {
    const counts = { total: projectPosts.length, Published: 0, 'In Progress': 0, Planned: 0, Cancelled: 0 };
    projectPosts.forEach(p => { if (counts[p.status] !== undefined) counts[p.status]++; });
    return counts;
  }, [projectPosts]);

  const filteredPosts = useMemo(() => {
    let arr = projectPosts.filter(p => {
      if (postFilterChannel !== 'all' && p.channel !== postFilterChannel) return false;
      if (postFilterStatus !== 'all' && p.status !== postFilterStatus) return false;
      if (search) {
        const q = search.toLowerCase();
        if (!`${p.copy || ''} ${p.topicType || ''} ${p.channel || ''}`.toLowerCase().includes(q)) return false;
      }
      return true;
    });
    // Sort by date desc (newest first), then time
    arr.sort((a, b) => {
      const da = a.date ? new Date(`${a.date}T${a.time || '00:00'}`).getTime() : 0;
      const db = b.date ? new Date(`${b.date}T${b.time || '00:00'}`).getTime() : 0;
      return db - da;
    });
    return arr;
  }, [projectPosts, postFilterChannel, postFilterStatus, search]);

  // PR Jobs scoped to current project + filtered
  const projectJobs = useMemo(() => jobs.filter(j => j.projectId === currentProjectId), [jobs, currentProjectId]);

  const filteredJobs = useMemo(() => {
    let arr = projectJobs.filter(j => {
      if (jobFilterCategory !== 'all' && j.category !== jobFilterCategory) return false;
      if (jobFilterStatus !== 'all' && getStatus(j) !== jobFilterStatus) return false;
      if (!itemMatchesPerson(j, filterPerson)) return false;
      if (search) {
        const q = search.toLowerCase();
        if (!`${j.title} ${formatPersonsText(j)} ${j.notes || ''} ${j.category || ''}`.toLowerCase().includes(q)) return false;
      }
      return true;
    });
    arr.sort((a, b) => {
      const da = a.deadline ? new Date(a.deadline).getTime() : Infinity;
      const db = b.deadline ? new Date(b.deadline).getTime() : Infinity;
      return da - db;
    });
    return arr;
  }, [projectJobs, jobFilterCategory, jobFilterStatus, filterPerson, search]);

  // Workload per category for line/area chart
  const workTimeline = useMemo(() => {
    const data = CATEGORIES.map(c => ({
      name: c.name,
      tasks: projectTasks.filter(t => t.category === c.name).length,
      done:  projectTasks.filter(t => t.category === c.name && getStatus(t) === 'done').length,
    })).filter(d => d.tasks > 0);
    return data;
  }, [projectTasks]);

  const statusDonutData = [
    { name: 'เสร็จแล้ว', value: stats.done,       color: STATUS_META.done.color },
    { name: 'กำลังทำ',   value: stats.inProgress, color: STATUS_META.inProgress.color },
    { name: 'ยังไม่เริ่ม', value: stats.notStarted, color: STATUS_META.notStarted.color },
    { name: 'เลยกำหนด',  value: stats.overdue,    color: STATUS_META.overdue.color },
  ].filter(d => d.value > 0);

  const memberWorkingPct = useMemo(() => {
    if (teamMembers.length === 0) return 0;
    const activeMembers = teamMembers.filter(m =>
      projectTasks.some(t => getPersons(t).includes(m.name) && getStatus(t) !== 'done')
    ).length;
    return Math.round((activeMembers / teamMembers.length) * 100);
  }, [projectTasks, teamMembers]);

  const filtered = useMemo(() => {
    // Regular tasks with an __itemType marker
    const taskItems = projectTasks.filter(t => {
      if (filterStatus !== 'all' && getStatus(t) !== filterStatus) return false;
      if (filterCategory !== 'all' && t.category !== filterCategory) return false;
      if (!itemMatchesPerson(t, filterPerson)) return false;
      if (search) {
        const q = search.toLowerCase();
        if (!`${t.title} ${formatPersonsText(t)} ${t.notes || ''}`.toLowerCase().includes(q)) return false;
      }
      return true;
    }).map(t => ({ ...t, __itemType: 'task' }));

    // Planning posts shown as cards. Filters:
    // - status filter: only applies if "In Progress" selected (maps to InProgress posts)
    //   Else we show Published/Planned posts too. We'll just skip status filter for posts.
    // - category filter: posts don't have category → skip unless filter is 'all'
    // - person filter: match post.person
    // - search: title-like is post.copy, plus topicType and person
    const postItems = projectPosts.filter(p => {
      // Hide posts if a specific category is selected (posts don't have categories)
      if (filterCategory !== 'all') return false;
      if (!itemMatchesPerson(p, filterPerson)) return false;
      // Map task status filter to post status roughly
      if (filterStatus !== 'all') {
        const map = { inProgress: 'In Progress', done: 'Published', notStarted: 'Planned' };
        if (filterStatus === 'overdue') return false; // posts don't have overdue concept
        if (map[filterStatus] && p.status !== map[filterStatus]) return false;
      }
      if (search) {
        const q = search.toLowerCase();
        const haystack = `${p.copy || ''} ${p.topicType || ''} ${formatPersonsText(p)} ${p.channel || ''}`.toLowerCase();
        if (!haystack.includes(q)) return false;
      }
      return true;
    }).map(p => ({ ...p, __itemType: 'post' }));

    const all = [...taskItems, ...postItems];
    // Sort by date (deadline for tasks, date for posts)
    all.sort((a, b) => {
      const da = a.__itemType === 'task' ? (a.deadline ? new Date(a.deadline).getTime() : Infinity) : (a.date ? new Date(a.date).getTime() : Infinity);
      const db = b.__itemType === 'task' ? (b.deadline ? new Date(b.deadline).getTime() : Infinity) : (b.date ? new Date(b.date).getTime() : Infinity);
      return da - db;
    });
    return all;
  }, [projectTasks, projectPosts, filterStatus, filterCategory, filterPerson, search]);

  return (
    <div
      className="min-h-screen w-full flex"
      style={{
        backgroundColor: T.mainBg,
        fontFamily: '"Plus Jakarta Sans", "IBM Plex Sans Thai", system-ui, sans-serif',
        color: T.text,
      }}
    >
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossOrigin="" />
      <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />

      <Sidebar
        view={view} setView={setView}
        open={sidebarOpen} onClose={() => setSidebarOpen(false)}
        onAdd={() => { setEditing(null); setShowModal(true); }}
        stats={stats}
        projects={projects}
        currentProjectId={currentProjectId}
        onSwitchProject={switchProject}
        onAddProject={() => setShowProjectModal(true)}
        onDeleteProject={deleteProject}
        teamMembers={teamMembers}
        onManageTeam={() => setShowTeamModal(true)}
        onOpenBackup={() => setShowBackupModal(true)}
      />

      {/* Center column */}
      <div className="flex-1 flex flex-col min-w-0 lg:ml-64 xl:mr-80">
        <TopBar
          search={search} setSearch={setSearch}
          onMenu={() => setSidebarOpen(true)}
          syncing={syncing} onRefresh={load}
        />

        <main className="flex-1 px-5 md:px-8 py-6 space-y-6">
          {loading ? (
            <div className="text-center py-24" style={{ color: T.textMuted }}>กำลังโหลด…</div>
          ) : view === 'planning' ? (
            <PlanningPost
              posts={filteredPosts}
              totalCount={projectPosts.length}
              onAdd={() => { setEditingPost(null); setShowPostModal(true); }}
              onEdit={(p) => { setEditingPost(p); setShowPostModal(true); }}
              onDelete={deletePost}
              filterChannel={postFilterChannel}
              setFilterChannel={setPostFilterChannel}
              filterStatus={postFilterStatus}
              setFilterStatus={setPostFilterStatus}
              onRefresh={load}
            />
          ) : view === 'pr-jobs' ? (
            <PRJobs
              jobs={filteredJobs}
              totalCount={projectJobs.length}
              onAdd={() => { setEditingJob(null); setShowJobModal(true); }}
              onEdit={(j) => { setEditingJob(j); setShowJobModal(true); }}
              onDelete={deleteJob}
              onProgress={updateJobProgress}
              filterCategory={jobFilterCategory}
              setFilterCategory={setJobFilterCategory}
              filterStatus={jobFilterStatus}
              setFilterStatus={setJobFilterStatus}
              filterPerson={filterPerson}
              setFilterPerson={setFilterPerson}
              teamMembers={teamMembers}
            />
          ) : view === 'history' ? (
            <WorkHistory
              tasks={historyTasks}
              onEdit={(t) => { setEditing(t); setShowModal(true); }}
              onDelete={deleteTask}
              currentProject={projects.find(p => p.id === currentProjectId)}
            />
          ) : view === 'dashboard' ? (
            <>
              <WelcomeCard onStart={() => setView('tasks')} />
              <StatsRow stats={stats} />
              <DueSoonSection
                tasks={dueSoon}
                onEdit={(t) => { setEditing(t); setShowModal(true); }}
              />
              <PlanningPostSummary
                stats={postStats}
                onView={() => setView('planning')}
              />
              <div className="grid grid-cols-1 xl:grid-cols-2 gap-5">
                <ChartCard title="งานแบ่งตามหมวด" subtitle="Tasks by category">
                  <CategoryAreaChart data={workTimeline} />
                </ChartCard>
                <ChartCard title="Task Percentage" subtitle="แบ่งตามสถานะปัจจุบัน">
                  <StatusMultiDonut data={statusDonutData} total={stats.total} />
                </ChartCard>
              </div>
              <div className="grid grid-cols-1 xl:grid-cols-3 gap-5">
                <div className="xl:col-span-2">
                  <ChartCard title="Work Progress" subtitle="งานที่กำลังดำเนินการ">
                    <WorkProgressList tasks={inProgressTasks}
                      onEdit={(t) => { setEditing(t); setShowModal(true); }}
                      onSeeAll={() => setView('tasks')} />
                  </ChartCard>
                </div>
                <ChartCard title="Working Status" subtitle="ทีมที่ active">
                  <WorkingStatusDonut pct={memberWorkingPct} />
                </ChartCard>
              </div>
            </>
          ) : (
            <>
              {/* Tracking Header */}
              <div className="flex items-center justify-between flex-wrap gap-3">
                <div>
                  <h2 className="text-2xl md:text-3xl font-bold tracking-tight" style={{ color: T.text }}>Tracking</h2>
                  <p className="text-xs md:text-sm mt-1" style={{ color: T.textMuted }}>
                    ติดตาม Tasks + Planning Posts ทั้งหมด · {filtered.length} รายการ
                  </p>
                </div>
                <ExportButton
                  label="Export Tracking"
                  onClick={() => exportToCSV(filtered, [
                    { label: 'ประเภท', value: (r) => r.__itemType === 'post' ? 'Post' : 'Task' },
                    { label: 'ชื่อ', value: (r) => r.__itemType === 'post' ? (r.copy || r.topicType || '-') : r.title },
                    { label: 'หมวด/Channel', value: (r) => r.__itemType === 'post' ? r.channel : r.category },
                    { label: 'สถานะ', value: (r) => r.__itemType === 'post' ? r.status : (STATUS_META[getStatus(r)]?.label || '-') },
                    { label: 'ผู้รับผิดชอบ', value: (r) => formatPersonsText(r) },
                    { label: 'วันที่/Deadline', value: (r) => r.__itemType === 'post' ? r.date : r.deadline },
                    { label: 'เวลา', value: (r) => r.__itemType === 'post' ? (r.time || '') : '' },
                    { label: 'Progress', value: (r) => r.__itemType === 'post' ? '' : (r.progress ?? 0) },
                    { label: 'หมายเหตุ', value: (r) => r.__itemType === 'post' ? (r.topicType || '') : (r.notes || '') },
                    { label: 'ลิงก์', value: (r) => r.__itemType === 'post' ? (r.link || '') : '' },
                  ], 'tracking')}
                />
              </div>

              <FilterBar
                filterStatus={filterStatus} setFilterStatus={setFilterStatus}
                filterCategory={filterCategory} setFilterCategory={setFilterCategory}
                filterPerson={filterPerson} setFilterPerson={setFilterPerson}
                count={filtered.length}
               teamMembers={teamMembers} />
              {filtered.length === 0 ? (
                <EmptyState onAdd={() => { setEditing(null); setShowModal(true); }} hasTasks={tasks.length > 0} />
              ) : (
                <div className="grid gap-4 grid-cols-1 md:grid-cols-2 2xl:grid-cols-3">
                  {filtered.map(item => (
                    item.__itemType === 'post' ? (
                      <PostCard
                        key={`p-${item.id}`} post={item}
                        onEdit={() => { setEditingPost(item); setShowPostModal(true); }}
                        onDelete={() => deletePost(item.id)}
                      />
                    ) : (
                      <TaskCard
                        key={`t-${item.id}`} task={item}
                        onEdit={() => { setEditing(item); setShowModal(true); }}
                        onDelete={() => deleteTask(item.id)}
                        onProgress={(p) => updateProgress(item.id, p)}
                      />
                    )
                  ))}
                </div>
              )}
            </>
          )}
        </main>
      </div>

      {/* Right panel — only on dashboard */}
      {view === 'dashboard' && <RightPanel tasks={projectTasks} upcoming={upcoming} onEditTask={(t) => { setEditing(t); setShowModal(true); }} />}

      {error && (
        <div className="fixed bottom-6 right-6 px-4 py-3 rounded-xl shadow-lg text-sm text-white z-50" style={{ backgroundColor: '#BE123C' }}>
          {error}
        </div>
      )}

      {showModal && <TaskModal task={editing} onSave={saveTask} onClose={() => { setShowModal(false); setEditing(null); }} teamMembers={teamMembers} />}

      {showProjectModal && (
        <ProjectModal
          onSave={async (name) => { await addProject(name); setShowProjectModal(false); }}
          onClose={() => setShowProjectModal(false)}
        />
      )}

      {showPostModal && (
        <PostModal
          post={editingPost}
          onSave={savePost}
          onClose={() => { setShowPostModal(false); setEditingPost(null); }}
          teamMembers={teamMembers}
        />
      )}

      {showTeamModal && (
        <TeamModal
          members={teamMembers}
          onSave={async (m) => { await saveTeamMembers(m); setShowTeamModal(false); }}
          onClose={() => setShowTeamModal(false)}
        />
      )}

      {showJobModal && (
        <JobModal
          job={editingJob}
          onSave={saveJob}
          onClose={() => { setShowJobModal(false); setEditingJob(null); }}
          teamMembers={teamMembers}
        />
      )}

      {showBackupModal && (
        <BackupModal
          onClose={() => setShowBackupModal(false)}
          onRestore={restoreFromBackup}
          onSaveNow={saveManualBackup}
          currentCounts={{
            tasks: tasks.length,
            posts: posts.length,
            jobs: jobs.length,
            team: teamMembers.length,
          }}
        />
      )}
    </div>
  );
}

/* ============================================================
   Sidebar  (dark navy — Image 2 style)
============================================================ */

    { id: 'pr-jobs',   label: 'Public Relations Jobs', icon: Megaphone },
    { id: 'history',   label: 'Work History',  icon: History },

  const currentProject = projects.find(p => p.id === currentProjectId) || projects[0];

  return (
    <>
      {open && <div className="lg:hidden fixed inset-0 bg-black/50 z-40" onClick={onClose} />}
      <aside
        className={`fixed top-0 left-0 bottom-0 w-64 z-50 flex flex-col transform transition-transform lg:translate-x-0 ${open ? 'translate-x-0' : '-translate-x-full'}`}
        style={{ backgroundColor: T.sidebarBg }}
      >
        {/* Logo */}
        <div className="px-6 pt-6 pb-5 flex items-center justify-between">
          <div className="flex items-center gap-2.5">
            <img src={LOGO_URL} alt="Andaman Sunday" className="w-10 h-10 object-contain bg-white rounded-lg p-1" />
            <div className="text-white text-lg font-bold tracking-tight leading-tight">
              Andaman<br/>Sunday
            </div>
          </div>
          <button onClick={onClose} className="lg:hidden text-slate-400">
            <X size={18} />
          </button>
        </div>

        {/* Project selector dropdown */}
        <div className="px-6 mb-4 relative">
          <div className="text-[11px] font-semibold uppercase tracking-wider mb-2" style={{ color: T.sidebarText }}>
            Project
          </div>
          <button
            onClick={() => setProjectMenuOpen(!projectMenuOpen)}
            className="w-full flex items-center justify-between px-3 py-2 rounded-lg text-sm font-medium text-white hover:opacity-90"
            style={{ backgroundColor: T.sidebarHover }}
          >
            <span className="truncate flex items-center gap-2">
              <span className="w-2 h-2 rounded-full flex-shrink-0" style={{ backgroundColor: currentProject?.color || T.cyan }} />
              {currentProject?.name || 'Marketing Dept.'}
            </span>
            <ChevronDown size={14} className={`text-slate-400 transition-transform ${projectMenuOpen ? 'rotate-180' : ''}`} />
          </button>
          {projectMenuOpen && (
            <div
              className="absolute left-6 right-6 mt-1 rounded-lg shadow-xl overflow-hidden z-10"
              style={{ backgroundColor: T.sidebarHover, border: `1px solid ${T.sidebarActive}` }}
            >
              {projects.map(p => {
                const active = p.id === currentProjectId;
                return (
                  <div
                    key={p.id}
                    className="flex items-center gap-2 px-3 py-2 hover:bg-black/20 group"
                  >
                    <button
                      onClick={() => { onSwitchProject(p.id); setProjectMenuOpen(false); }}
                      className="flex items-center gap-2 flex-1 min-w-0 text-left"
                    >
                      <span className="w-2 h-2 rounded-full flex-shrink-0" style={{ backgroundColor: p.color }} />
                      <span className={`text-sm truncate ${active ? 'text-white font-semibold' : 'text-slate-300'}`}>{p.name}</span>
                      {active && <span className="text-amber-400 text-xs ml-auto">✓</span>}
                    </button>
                    {p.id !== DEFAULT_PROJECT.id && (
                      <button
                        onClick={(e) => { e.stopPropagation(); onDeleteProject(p.id); setProjectMenuOpen(false); }}
                        className="opacity-0 group-hover:opacity-100 p-1 hover:bg-rose-900/30 rounded"
                        title="ลบโปรเจกต์"
                      >
                        <Trash2 size={12} className="text-rose-400" />
                      </button>
                    )}
                  </div>
                );
              })}
              <button
                onClick={() => { onAddProject(); setProjectMenuOpen(false); }}
                className="w-full flex items-center gap-2 px-3 py-2 text-sm text-amber-400 hover:bg-black/20 border-t"
                style={{ borderColor: T.sidebarActive }}
              >
                <Plus size={14} />
                <span>เพิ่มโปรเจกต์ใหม่</span>
              </button>
            </div>
          )}
        </div>

        {/* Nav */}
        <nav className="flex-1 px-3 space-y-0.5 overflow-y-auto">
          {items.map(it => <NavItem key={it.id} {...it} active={view === it.id} onClick={() => { setView(it.id); onClose(); }} />)}

          {/* Mini progress widget */}
          <div className="mt-6 mx-3 px-3 py-3 rounded-lg" style={{ backgroundColor: T.sidebarHover }}>
            <div className="flex items-center justify-between mb-2">
              <span className="text-[11px] uppercase tracking-wider font-semibold" style={{ color: T.sidebarText }}>Progress</span>
              <span className="text-xs font-bold text-white">{stats.avg}%</span>
            </div>
            <div className="h-1.5 rounded-full overflow-hidden" style={{ backgroundColor: T.sidebarBg }}>
              <div className="h-full rounded-full" style={{ width: `${stats.avg}%`, backgroundColor: T.cyan }} />
            </div>
          </div>
        </nav>

        {/* ADD NEW TASK button */}
        <div className="p-4">
          <button
            onClick={onAdd}
            className="w-full flex flex-col items-center gap-1 py-4 rounded-xl text-white font-semibold text-xs uppercase tracking-wider transition hover:opacity-90"
            style={{ backgroundColor: T.navy }}
          >
            <div className="w-9 h-9 rounded-full flex items-center justify-center mb-1" style={{ backgroundColor: 'rgba(255,255,255,0.15)' }}>
              <Plus size={20} className="text-white" />
            </div>
            ADD NEW TASK
          </button>

        {/* Team avatars at bottom - click to manage */}
        <div className="px-4 pb-4">
          <button
            onClick={onManageTeam}
            className="w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl transition hover:bg-white/5"
            style={{ backgroundColor: T.sidebarHover }}
            title="คลิกเพื่อจัดการทีม (เพิ่ม / ลบ / แก้ไขสมาชิก)"
          >
            <div className="flex -space-x-2">
              {teamMembers.slice(0, 3).map(m => (
                <Avatar key={m.name} name={m.name} color={m.color} size={28} ring={T.sidebarHover} />
              ))}
              {teamMembers.length > 3 && (
                <div className="w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold text-white" style={{ backgroundColor: T.navy, border: `2px solid ${T.sidebarHover}` }}>
                  +{teamMembers.length - 3}
                </div>
              )}
            </div>
            <div className="min-w-0 flex-1 text-left">
              <div className="text-xs font-semibold text-white truncate">Marketing Team</div>
              <div className="text-[10px] uppercase tracking-wider" style={{ color: T.sidebarText }}>{teamMembers.length} members · จัดการ</div>
            </div>
            <Edit3 size={14} style={{ color: T.sidebarText }} />
          </button>
        </div>
      </aside>
    </>
  );
}

function NavItem({ icon: Icon, label, badge, active, disabled, onClick }) {
  const cls = active ? 'text-white' : disabled ? 'text-slate-600 cursor-not-allowed' : 'text-slate-400 hover:text-white';
  return (
    <button
      onClick={disabled ? undefined : onClick}
      className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition ${cls}`}
      style={active ? { backgroundColor: T.sidebarActive } : {}}
    >
      <Icon size={18} />
      <span className="flex-1 text-left">{label}</span>
      {badge != null && (
        <span className="text-[10px] px-1.5 py-0.5 rounded font-bold" style={{ backgroundColor: active ? 'rgba(255,255,255,0.2)' : T.sidebarHover, color: 'white' }}>
          {badge}
        </span>
      )}
    </button>
  );
}

/* ============================================================
   Top Bar
============================================================ */
function TopBar({ search, setSearch, onMenu, syncing, onRefresh }) {
  const today = new Date();
  const dateStr = formatDateLong(today);
  const monthYear = new Intl.DateTimeFormat('en-US', { month: 'long', year: 'numeric' }).format(today);
  const shortDate = new Intl.DateTimeFormat('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).format(today);

  return (

function MiniCalendar({ tasks, onEditTask }) {
  // range: { start: Date, end: Date | null }  (end=null during mid-selection)
  const [range, setRange] = useState(null);
  const [month, setMonth] = useState(new Date());
  const today = new Date();
  today.setHours(0,0,0,0);

  const firstDay = new Date(month.getFullYear(), month.getMonth(), 1);
  const lastDay = new Date(month.getFullYear(), month.getMonth() + 1, 0);
  const daysInMonth = lastDay.getDate();
  const startWeekDay = firstDay.getDay();

  const dayLabels = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];

  const cells = [];
  for (let i = 0; i < startWeekDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  // Days with task deadlines (to show dot)
  const deadlineDays = new Set();
  tasks.forEach(t => {
    if (!t.deadline) return;
    const d = new Date(t.deadline);
    if (d.getMonth() === month.getMonth() && d.getFullYear() === month.getFullYear()) {
      deadlineDays.add(d.getDate());
    }
  });

  const monthLabel = new Intl.DateTimeFormat('en-US', { month: 'long', year: 'numeric' }).format(month);

  const handleDayClick = (cellDate) => {
    if (!range || (range.start && range.end)) {
      // Start new range
      setRange({ start: cellDate, end: null });
    } else if (range.start && !range.end) {
      // Complete the range
      if (cellDate.getTime() === range.start.getTime()) {
        // Clicked same day twice = single-day selection (close it)
        setRange({ start: range.start, end: range.start });
      } else if (cellDate < range.start) {
        setRange({ start: cellDate, end: range.start });
      } else {
        setRange({ start: range.start, end: cellDate });
      }
    }
  };

  const isInRange = (cellDate) => {
    if (!range || !range.start) return false;
    const end = range.end || range.start;
    return cellDate >= range.start && cellDate <= end;
  };
  const isRangeStart = (cellDate) => range?.start && cellDate.getTime() === range.start.getTime();
  const isRangeEnd   = (cellDate) => range?.end   && cellDate.getTime() === range.end.getTime();

  // Tasks that fall within the selected range
  const rangeTasks = range && range.start ? tasks.filter(t => {
    if (!t.deadline) return false;
    const td = new Date(t.deadline);
    td.setHours(0,0,0,0);
    const end = range.end || range.start;
    return td >= range.start && td <= end;
  }).sort((a, b) => new Date(a.deadline) - new Date(b.deadline)) : [];

  const fmt = (d) => new Intl.DateTimeFormat('th-TH', { day: 'numeric', month: 'short' }).format(d);
  const rangeLabel = range?.start ? (
    range.end && range.end.getTime() !== range.start.getTime()
      ? `${fmt(range.start)} — ${fmt(range.end)}`
      : fmt(range.start)
  ) : '';

  return (
    <div className="rounded-2xl p-5" style={{ backgroundColor: T.cardBg, border: `1px solid ${T.border}` }}>
      <div className="flex items-center justify-between mb-2">
        <div className="text-base font-bold" style={{ color: T.text }}>{monthLabel}</div>
        <div className="flex items-center gap-1">
          <button
            onClick={() => setMonth(new Date(month.getFullYear(), month.getMonth() - 1, 1))}
            className="p-1 rounded hover:bg-black/5" style={{ color: T.textMuted }}
          ><ChevronLeft size={16} /></button>
          <button
            onClick={() => setMonth(new Date(month.getFullYear(), month.getMonth() + 1, 1))}
            className="p-1 rounded hover:bg-black/5" style={{ color: T.textMuted }}
          ><ChevronRight size={16} /></button>
        </div>
      </div>

      {/* Instruction / range status */}
      <div className="flex items-center justify-between mb-3 min-h-[18px]">
        <div className="text-[10px]" style={{ color: T.textMuted }}>
          {!range ? 'คลิกเลือกวัน หรือเลือกเป็นช่วงวัน' :
           range && !range.end ? 'คลิกวันที่สอง (หรือวันเดิมถ้าเลือกวันเดียว)' :
           rangeLabel}
        </div>
        {range && (
          <button
            onClick={() => setRange(null)}
            className="text-[10px] hover:underline"
            style={{ color: T.navy, fontWeight: 600 }}
          >ล้าง</button>
        )}
      </div>

      <div className="grid grid-cols-7 gap-1 mb-2">
        {dayLabels.map((d, i) => (
          <div key={i} className="text-center text-[10px] font-bold uppercase" style={{ color: T.textMuted }}>{d}</div>
        ))}
      </div>
      <div className="grid grid-cols-7 gap-1">
        {cells.map((d, i) => {
          if (d === null) return <div key={i} />;
          const cellDate = new Date(month.getFullYear(), month.getMonth(), d);
          const isToday = cellDate.getTime() === today.getTime();
          const hasDeadline = deadlineDays.has(d);
          const inRange = isInRange(cellDate);
          const rStart = isRangeStart(cellDate);
          const rEnd = isRangeEnd(cellDate);
          const isEdge = rStart || rEnd;

          let bg = 'transparent';
          let fg = T.text;
          if (isEdge) { bg = T.navy; fg = 'white'; }
          else if (inRange) { bg = T.navy + '20'; fg = T.text; }
          else if (isToday) { bg = T.pillBlue + '60'; fg = T.text; }

          return (
            <button
              key={i}
              onClick={() => handleDayClick(cellDate)}
              className="aspect-square flex items-center justify-center text-xs font-medium rounded-lg relative transition hover:opacity-80"
              style={{
                backgroundColor: bg,
                color: fg,
                fontWeight: (isEdge || isToday) ? 700 : 500,
              }}
            >
              {d}
              {hasDeadline && !isEdge && (
                <span className="absolute bottom-1 w-1 h-1 rounded-full" style={{ backgroundColor: inRange ? T.navy : T.cyan }} />
              )}
            </button>
          );
        })}
      </div>

      {/* Selected range tasks */}
      {range && range.end && (
        <div className="mt-4 pt-4 border-t" style={{ borderColor: T.border }}>
          <div className="flex items-baseline justify-between mb-2">
            <div className="text-xs font-bold" style={{ color: T.text }}>
              {rangeTasks.length > 0 ? `${rangeTasks.length} งาน` : 'ไม่มีงานในช่วงนี้'}

          <div className="space-y-1.5 max-h-60 overflow-y-auto pr-1">
            {rangeTasks.map(t => {

/* ============================================================
   Avatar
============================================================ */
function Avatar({ name, color, size = 32, ring }) {
  return (
    <div
      className="rounded-full flex items-center justify-center font-bold text-white flex-shrink-0"
      style={{
        width: size, height: size, backgroundColor: color,
        fontSize: size * 0.36,
        boxShadow: ring ? `0 0 0 2px ${ring}` : undefined,
      }}
      title={name}
    >
      {getInitials(name)}
    </div>
  );
}

/* Stacked avatars for multi-person display */
function AvatarStack({ names, size = 24, max = 3 }) {
  if (!names || names.length === 0) return null;
  const visible = names.slice(0, max);
  const overflow = names.length - max;
  return (
    <div className="flex -space-x-1.5 items-center">
      {visible.map((n, i) => (
        <Avatar key={n + i} name={n} color={getPersonColor(n)} size={size} ring="white" />
      ))}
      {overflow > 0 && (
        <div
          className="rounded-full flex items-center justify-center text-white font-bold flex-shrink-0"
          style={{
            width: size, height: size,
            backgroundColor: '#64748B',
            fontSize: size * 0.36,
            boxShadow: '0 0 0 2px white',
          }}
          title={names.slice(max).join(', ')}
        >
          +{overflow}
        </div>
      )}
    </div>
  );
}

/* Display assigned persons (avatars + names) with empty state */
function PersonsDisplay({ item, size = 24, showText = true, maxAvatars = 3 }) {
  const persons = getPersons(item);
  if (persons.length === 0) {
    return (
      <>
        <div className="rounded-full border-2 border-dashed flex-shrink-0" style={{ width: size, height: size, borderColor: T.border }} />
        {showText && <span className="text-xs" style={{ color: T.textMuted }}>ยังไม่ assign</span>}
      </>
    );
  }
  return (
    <>
      <AvatarStack names={persons} size={size} max={maxAvatars} />
      {showText && (
        <span className="text-xs font-semibold truncate" style={{ color: T.text }}>
          {persons.length === 1 ? persons[0] : `${persons[0]} +${persons.length - 1}`}
        </span>
      )}
    </>
  );
}

            {totalCount === 0 ? 'ยังไม่มี Job' : 'ไม่พบ job ที่ตรงกับ filter'}
          </h3>
          <p className="text-sm mb-5" style={{ color: T.textMuted }}>
            {totalCount === 0 ? 'เริ่มต้นด้วยการเพิ่ม PR Job แรกของทีม' : 'ลองเปลี่ยน filter หรือล้างคำค้นหา'}
          </p>
          {totalCount === 0 && (
            <button onClick={onAdd} className="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold rounded-lg text-white transition" style={{ backgroundColor: T.navy }}>
              <Plus size={16} /> Add New Jobs
            </button>
          )}
        </div>
      ) : (
        <div className="grid gap-4 grid-cols-1 md:grid-cols-2 2xl:grid-cols-3">
          {jobs.map(j => (
            <JobCard key={j.id} job={j}
              onEdit={() => onEdit(j)}
              onDelete={() => onDelete(j.id)}
              onProgress={(p) => onProgress(j.id, p)}
            />
          ))}
        </div>
      )}
    </>
  );
}

function JobModal({ job, onSave, onClose, teamMembers }) {
  const [title, setTitle] = useState(job?.title || '');
  const [persons, setPersonsState] = useState(getPersons(job));
  const [category, setCategory] = useState(job?.category || JOB_CATEGORIES[0].name);
  const [deadline, setDeadline] = useState(job?.deadline || '');
  const [progress, setProgress] = useState(job?.progress ?? 0);
  const [notes, setNotes] = useState(job?.notes || '');

  const togglePerson = (name) => {
    setPersonsState(prev => prev.includes(name) ? prev.filter(p => p !== name) : [...prev, name]);
  };

  const handleSave = () => {
    if (!title.trim()) { alert('กรอกชื่อ Job ก่อนนะ'); return; }
    onSave({
      ...(job || {}),
      title: title.trim(), category, deadline,
      progress: parseInt(progress) || 0, notes: notes.trim(),
      ...buildPersonFields(persons),
    });
  };

  return (
    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4" style={{ backgroundColor: 'rgba(11, 18, 32, 0.6)' }} onClick={onClose}>
      <div className="w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden" style={{ backgroundColor: T.cardBg }} onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between px-6 py-4 border-b" style={{ borderColor: T.border }}>
          <div>
            <h2 className="text-lg font-bold" style={{ color: T.text }}>{job ? 'แก้ไข Job' : 'Add New Jobs'}</h2>
            <p className="text-xs mt-0.5" style={{ color: T.textMuted }}>Public Relations · PR / EVENT / BLOGGER / SOCIAL CHINA</p>
          </div>
          <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-black/5">
            <X size={18} style={{ color: T.textMuted }} />
          </button>
        </div>
        <div className="p-6 space-y-4 max-h-[70vh] overflow-y-auto">
          <Field label="ชื่อ Job" required>
            <input autoFocus value={title} onChange={(e) => setTitle(e.target.value)}

              className="w-full px-3.5 py-2.5 text-sm rounded-lg border outline-none focus:ring-2"
              style={{ borderColor: T.border, backgroundColor: 'white' }} />
          </Field>

          <Field label={`ผู้รับผิดชอบ ${persons.length > 0 ? `(${persons.length} คน)` : '— กดเลือกได้หลายคน'}`}>

          <Field label="หมวดหมู่ Jobs" required>

                <div className="h-full" style={{ width: `${progress}%`, backgroundColor: T.navy }} />
              </div>

                onChange={(e) => setProgress(e.target.value)}

            </div>

          <Field label="หมายเหตุ / comment">
            <textarea value={notes} onChange={(e) => setNotes(e.target.value)} rows={3}

/* ============================================================
   Backup & Restore Modal (Option A)
============================================================ */
function BackupModal({ onClose, onRestore, onSaveNow, currentCounts }) {
  const [backups, setBackups] = useState(getLocalBackups());
  const [selectedId, setSelectedId] = useState(null);
  const [scope, setScope] = useState('posts');  // posts | tasks | jobs | team | all
  const fileInputRef = React.useRef(null);
  const [importedSnapshot, setImportedSnapshot] = useState(null);

  const refresh = () => setBackups(getLocalBackups());

  const handleSaveNow = () => {
    onSaveNow();
    setTimeout(refresh, 100);
  };

  const handleDelete = (id) => {
    if (!confirm('ลบ backup นี้?')) return;
    deleteLocalBackup(id);
    refresh();
    if (selectedId === id) setSelectedId(null);
  };

  const handleDownload = (snap) => downloadBackupAsJson(snap);

  const handleFileImport = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!parsed.data) throw new Error('ไฟล์ไม่ใช่ backup ที่ถูกต้อง');
        setImportedSnapshot(parsed);
        // also add to history
        try {
          const existing = getLocalBackups();
          const next = [{ ...parsed, id: 'bak_imp_' + Date.now().toString(36), tag: 'imported' }, ...existing].slice(0, BACKUP_MAX);
          localStorage.setItem(BACKUP_KEY, JSON.stringify(next));
          refresh();
        } catch (e) {}
        alert('✅ โหลดไฟล์ backup สำเร็จ — เลือกในรายการเพื่อกู้คืน');
      } catch (err) {
        alert('❌ อ่านไฟล์ไม่ได้: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const selected = backups.find(b => b.id === selectedId);

  const scopeLabel = {
    all:   'ทั้งหมด (Tasks + Posts + Jobs + Team)',
    posts: 'Planning Posts เท่านั้น',
    tasks: 'Tasks เท่านั้น',
    jobs:  'PR Jobs เท่านั้น',
    team:  'Team Members เท่านั้น',
  };

  const handleRestore = () => {
    if (!selected) return;
    const targetCount = scope === 'posts' ? selected.counts.posts
      : scope === 'tasks' ? selected.counts.tasks
      : scope === 'jobs'  ? selected.counts.jobs
      : scope === 'team'  ? selected.counts.team
      : (selected.counts.posts + selected.counts.tasks + selected.counts.jobs);
    const currentCount = scope === 'posts' ? currentCounts.posts
      : scope === 'tasks' ? currentCounts.tasks
      : scope === 'jobs'  ? currentCounts.jobs
      : scope === 'team'  ? currentCounts.team
      : (currentCounts.posts + currentCounts.tasks + currentCounts.jobs);
    const msg = `ยืนยันการกู้คืน?\n\nจะแทน "${scopeLabel[scope]}":\n` +
                `  ของเดิม ${currentCount} รายการ → backup ${targetCount} รายการ\n\n` +
                `ระบบจะสร้าง backup ของ "ของเดิม" ก่อน เพื่อให้ undo ได้\n` +
                `Backup จาก: ${new Date(selected.timestamp).toLocaleString('th-TH')}`;
    if (!confirm(msg)) return;
    onRestore(selected, scope);
  };

  const fmt = (ts) => new Intl.DateTimeFormat('th-TH', {
    day: 'numeric', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  }).format(new Date(ts));

  return (
    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4" style={{ backgroundColor: 'rgba(11, 18, 32, 0.6)' }} onClick={onClose}>
      <div className="w-full max-w-3xl rounded-2xl shadow-2xl overflow-hidden" style={{ backgroundColor: T.cardBg }} onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between px-6 py-4 border-b" style={{ borderColor: T.border }}>
          <div>
            <h2 className="text-lg font-bold flex items-center gap-2" style={{ color: T.text }}>
              <Download size={18} style={{ color: T.navy }} />
              Backup &amp; Restore
            </h2>
            <p className="text-xs mt-0.5" style={{ color: T.textMuted }}>
              ระบบ backup อัตโนมัติทุกครั้งที่โหลดแอพ — เก็บใน browser ของคุณ (เครื่องนี้เท่านั้น)
            </p>
          </div>
          <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-black/5">
            <X size={18} style={{ color: T.textMuted }} />
          </button>
        </div>

        {/* Toolbar */}
        <div className="px-6 py-3 border-b flex items-center gap-2 flex-wrap" style={{ borderColor: T.border, backgroundColor: '#FAFAF7' }}>
          <button
            onClick={handleSaveNow}
            className="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold rounded-lg text-white"
            style={{ backgroundColor: T.navy }}
          >
            <Plus size={14} /> Save Backup ตอนนี้
          </button>
          <button
            onClick={() => fileInputRef.current?.click()}
            className="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold rounded-lg border bg-white"
            style={{ borderColor: T.border, color: T.text }}
          >
            📂 Import จากไฟล์ JSON
          </button>
          <input
            ref={fileInputRef}
            type="file"
            accept="application/json,.json"
            onChange={handleFileImport}
            style={{ display: 'none' }}
          />
          <span className="ml-auto text-xs" style={{ color: T.textMuted }}>
            ปัจจุบัน: {currentCounts.tasks} tasks · {currentCounts.posts} posts · {currentCounts.jobs} jobs
          </span>
        </div>

        {/* Backup list + restore options */}
        <div className="grid grid-cols-1 md:grid-cols-2 gap-0 max-h-[60vh]">
          {/* Left: backup list */}
          <div className="border-r overflow-y-auto" style={{ borderColor: T.border, maxHeight: '60vh' }}>
            <div className="px-4 py-2 text-[10px] font-bold uppercase tracking-wider" style={{ color: T.textMuted, backgroundColor: '#F8FAFC' }}>
              ประวัติ Backup ({backups.length})
            </div>
            {backups.length === 0 ? (
              <div className="px-4 py-8 text-center text-xs" style={{ color: T.textMuted }}>
                ยังไม่มี backup<br/>โหลดแอพหรือกด "Save Backup ตอนนี้"
              </div>
            ) : (
              <div className="divide-y" style={{ borderColor: T.border }}>
                {backups.map(b => {
                  const active = selectedId === b.id;
                  const tagLabel = b.tag === 'manual' ? '💾 Manual' : b.tag === 'before-restore' ? '↶ Before Restore' : b.tag === 'imported' ? '📂 Imported' : '🔄 Auto';
                  return (
                    <button
                      key={b.id}
                      onClick={() => setSelectedId(b.id)}
                      className="w-full text-left px-4 py-3 transition hover:bg-slate-50"
                      style={{ backgroundColor: active ? T.pillBlue : 'transparent' }}
                    >
                      <div className="flex items-baseline justify-between gap-2 mb-1">
                        <div className="text-xs font-bold" style={{ color: T.text }}>{fmt(b.timestamp)}</div>
                        <span className="text-[9px] font-semibold px-1.5 py-0.5 rounded" style={{ color: T.navy, backgroundColor: 'white' }}>
                          {tagLabel}
                        </span>
                      </div>
                      <div className="text-[10px]" style={{ color: T.textMuted }}>
                        {b.counts.tasks} tasks · {b.counts.posts} posts · {b.counts.jobs} jobs · {b.counts.team} team
                      </div>
                    </button>
                  );
                })}
              </div>
            )}
          </div>

          {/* Right: restore details */}
          <div className="p-5 overflow-y-auto" style={{ maxHeight: '60vh' }}>
            {!selected ? (
              <div className="text-center py-12 text-sm" style={{ color: T.textMuted }}>
                ← เลือก backup จากรายการ
              </div>
            ) : (
              <div className="space-y-4">
                <div>
                  <div className="text-xs font-semibold mb-1" style={{ color: T.textMuted }}>Backup ที่เลือก</div>
                  <div className="text-base font-bold" style={{ color: T.text }}>{fmt(selected.timestamp)}</div>
                </div>

                <div className="grid grid-cols-2 gap-2 text-xs">
                  <div className="rounded-lg p-2.5" style={{ backgroundColor: T.pillBlue }}>
                    <div className="font-semibold" style={{ color: T.navy }}>📝 Tasks</div>
                    <div className="text-lg font-bold" style={{ color: T.text }}>{selected.counts.tasks}</div>
                    <div className="text-[10px]" style={{ color: T.textMuted }}>ปัจจุบัน: {currentCounts.tasks}</div>
                  </div>
                  <div className="rounded-lg p-2.5" style={{ backgroundColor: '#FCE7F3' }}>
                    <div className="font-semibold" style={{ color: '#BE185D' }}>📅 Posts</div>
                    <div className="text-lg font-bold" style={{ color: T.text }}>{selected.counts.posts}</div>
                    <div className="text-[10px]" style={{ color: T.textMuted }}>ปัจจุบัน: {currentCounts.posts}</div>
                  </div>
                  <div className="rounded-lg p-2.5" style={{ backgroundColor: '#FED7AA' }}>
                    <div className="font-semibold" style={{ color: '#C2410C' }}>📢 Jobs</div>
                    <div className="text-lg font-bold" style={{ color: T.text }}>{selected.counts.jobs}</div>
                    <div className="text-[10px]" style={{ color: T.textMuted }}>ปัจจุบัน: {currentCounts.jobs}</div>
                  </div>
                  <div className="rounded-lg p-2.5" style={{ backgroundColor: '#D1FAE5' }}>
                    <div className="font-semibold" style={{ color: '#047857' }}>👥 Team</div>
                    <div className="text-lg font-bold" style={{ color: T.text }}>{selected.counts.team}</div>
                    <div className="text-[10px]" style={{ color: T.textMuted }}>ปัจจุบัน: {currentCounts.team}</div>
                  </div>
                </div>

                <div>
                  <div className="text-xs font-semibold mb-2" style={{ color: T.text }}>กู้คืนเฉพาะ:</div>
                  <div className="space-y-1.5">
                    {Object.entries(scopeLabel).map(([k, l]) => (
                      <label key={k} className="flex items-center gap-2 text-xs cursor-pointer">
                        <input
                          type="radio"
                          name="scope"
                          checked={scope === k}
                          onChange={() => setScope(k)}
                        />

                    ))}
                  </div>
                </div>

                <div className="flex items-center gap-2 pt-2">
                  <button
                    onClick={handleRestore}

                    style={{ backgroundColor: '#047857' }}

                  </button>
                  <button
                    onClick={() => handleDownload(selected)}
                    className="px-3 py-2.5 text-xs font-semibold rounded-lg border bg-white"
                    style={{ borderColor: T.border, color: T.text }}

                  >
                    <Trash2 size={14} />

                </div>

                <div className="text-[10px] p-2 rounded-lg" style={{ backgroundColor: '#FEF3C7', color: '#92400E' }}>
                  ⚠️ การกู้คืนจะ <strong>เขียนทับ</strong> ข้อมูลปัจจุบันของทุกคน (sync ขึ้น Cloud) — แต่ระบบจะสร้าง backup ของ "ของเดิม" ก่อน เพื่อให้ undo ได้
                </div>
              </div>

          </div>
        </div>

        <div className="flex items-center justify-end gap-2 px-6 py-4 border-t" style={{ backgroundColor: '#FAFAF7', borderColor: T.border }}>
          <button onClick={onClose} className="px-4 py-2 text-sm font-medium rounded-lg hover:bg-black/5" style={{ color: T.textMuted }}>ปิด</button>
        </div>
      </div>
    </div>
  );
}

function TaskModal({ task, onSave, onClose, teamMembers }) {

  const [category, setCategory] = useState(task?.category || CATEGORIES[0].name);

  const [notes, setNotes] = useState(task?.notes || '');

  const togglePerson = (name) => {
    setPersonsState(prev => prev.includes(name) ? prev.filter(p => p !== name) : [...prev, name]);
  };

  const handleSave = () => {
    if (!title.trim()) { alert('กรอกชื่อ task ก่อนนะ'); return; }
    onSave({
      ...(task || {}),
      title: title.trim(), category, deadline,
      progress: parseInt(progress) || 0, notes: notes.trim(),
      ...buildPersonFields(persons),

  return (
    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4" style={{ backgroundColor: 'rgba(11, 18, 32, 0.6)' }} onClick={onClose}>
      <div className="w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden" style={{ backgroundColor: T.cardBg }} onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between px-6 py-4 border-b" style={{ borderColor: T.border }}>

          <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-black/5">
            <X size={18} style={{ color: T.textMuted }} />
          </button>
        </div>
        <div className="p-6 space-y-4 max-h-[70vh] overflow-y-auto">
          <Field label="ชื่อ Task" required>
            <input autoFocus value={title} onChange={(e) => setTitle(e.target.value)}
              placeholder="เช่น โพสต์ IG สำหรับโปรทัวร์เกาะสิมิลัน"

              style={{ borderColor: T.border, backgroundColor: 'white' }} />

                    <Avatar name={m.name} color={active ? 'rgba(255,255,255,0.25)' : m.color} size={20} />
                    <span className="text-xs font-semibold" style={{ color: active ? 'white' : T.text }}>{m.name}</span>
                    {active && <CheckCircle2 size={12} style={{ color: 'white' }} />}
                  </button>

              })}
            </div>
          </Field>
          <div className="grid grid-cols-2 gap-3">
            <Field label="หมวดหมู่">
              <select value={category} onChange={(e) => setCategory(e.target.value)}
